server:
  port: 18083

spring:
  application:
    name: service-order
  config:
    import: optional:nacos:${spring.application.name}.yaml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:13306}/springcloud_lab?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        namespace: ${NACOS_NAMESPACE:}
      config:
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
    openfeign:
      sentinel:
        enabled: true
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
        port: ${SENTINEL_PORT:8722}

feign:
  sentinel:
    enabled: true

custom:
  order:
    featureFlag: true
    maxCreateCount: 5

seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: springcloud_tx_group
  service:
    vgroup-mapping:
      springcloud_tx_group: default
    grouplist:
      default: ${SEATA_ADDR:127.0.0.1:8091}
  registry:
    type: file
  config:
    type: file

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
